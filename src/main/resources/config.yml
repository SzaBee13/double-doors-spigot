# Whether to enable the recursive opening feature
enableRecursiveOpening: true

# Maximum block distance for recursive search (1-32)
recursiveOpeningMaxBlocksDistance: 10

# Whether double doors are enabled
enableDoors: true

# Whether double fence gates are enabled
enableFenceGates: true

# Whether double trapdoors are enabled
enableTrapdoors: true

# Whether villagers trigger linked-door behavior (open/close partner doors when pathfinding)
enableVillagerLinkedDoors: true

# Global on/off switch for all DoubleDoors behavior on this server
serverWideEnabled: true

# Active plugin language file (without extension).
# Built-in default: lang/en_US.json
# Custom translations can be placed in: plugins/DoubleDoors/lang/<language>.json
language: en_US
