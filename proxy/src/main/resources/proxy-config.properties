# Shared SQL config. Must match bukkit/sql section when using SQL mode.
sql.enabled=false

# Enable anonymous FastStats tracking
# ALSO CHANGE IN plugins/faststats/config.properties
# Info we track is public usage data and can be viewed at: https://faststats.dev/project/double-doors-server/minecraft-proxy
enableAnonymousTracking=true

# Enable additional anonymous telemetry like server location, countries, Java version, and system statistics.
enableExtendedAnonymousTracking=false

# Optional countries for this proxy or hosted region, comma-separated.
trackingCountries=

# Optional human-readable server location label, such as EU, US-East, or Frankfurt.
trackingServerLocation=

# Examples:
# sqlite: jdbc:sqlite:/absolute/path/to/doubledoors.db (absolute path required for proxy<->bukkit sharing)
# mysql: jdbc:mysql://127.0.0.1:3306/doubledoors
# Relative SQLite paths create separate DB files per process and break shared heartbeat detection.
sql.jdbcUrl=jdbc:sqlite:plugins/DoubleDoors/doubledoors.db
sql.username=
sql.password=

# Unique ID for this proxy instance in dd_proxy_presence.
sql.proxyId=velocity-main

# Heartbeat interval written by this proxy.
sql.heartbeatSeconds=30
